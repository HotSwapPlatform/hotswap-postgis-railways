services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hotswap-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hotswap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - hotswap-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotswap"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hotswap-pgdata:
