<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotSwap PostGIS Railways</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; }
        header { background: #1e3a5f; color: white; padding: 16px 24px; }
        header h1 { font-size: 1.4rem; font-weight: 600; }
        header p  { font-size: 0.85rem; opacity: 0.8; margin-top: 2px; }
        main { padding: 24px; max-width: 1100px; margin: 0 auto; }
        .status-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
                      background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 16px; }
        .status-text { flex: 1; font-size: 0.9rem; color: #475569; }
        .btn { padding: 8px 18px; background: #2563eb; color: white; border: none;
               border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
        .btn:hover { background: #1d4ed8; }
        .btn--danger { background: #dc2626; }
        .btn--danger:hover { background: #b91c1c; }
        .adapter-panel { background: white; border: 1px solid #e2e8f0; border-radius: 8px;
                         padding: 12px 16px; margin-bottom: 12px; }
        .adapter-panel h2 { font-size: 0.8rem; font-weight: 600; color: #64748b;
                            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
        .adapter-list { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
        .adapter-item { display: flex; align-items: center; gap: 7px; font-size: 0.9rem; }
        .adapter-item label { display: flex; align-items: center; gap: 7px; cursor: pointer; }
        .adapter-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #2563eb; }
        .adapter-item.loading { opacity: 0.6; }
        .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        #map { height: 580px; border-radius: 8px; border: 1px solid #e2e8f0; background: #e8f4f8; }
        .error { color: #dc2626; }
        .attribution { margin-top: 10px; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>
<header>
    <h1>HotSwap PostGIS Railways</h1>
    <p>Rautatieliikennepaikkojen sijaintidata — Digitraffic / Fintraffic + Euroopan pääasemat</p>
</header>
<main>
    <div class="status-bar">
        <span class="status-text" id="status-text">Tarkistetaan tilaa...</span>
        <button class="btn btn--danger" id="clear-btn" onclick="clearAll()" style="display:none">
            Tyhjennä kaikki
        </button>
    </div>
    <div class="adapter-panel">
        <h2>Datalähteet</h2>
        <div class="adapter-list" id="adapter-list">
            <span style="color:#94a3b8; font-size:0.85rem">Ladataan...</span>
        </div>
    </div>
    <div id="map"></div>
    <p class="attribution">
        Suomen liikennetietojen lähde <a href="https://www.digitraffic.fi/" target="_blank" rel="noopener">Fintraffic / Digitraffic</a>,
        <a href="https://creativecommons.org/licenses/by/4.0/deed.fi" target="_blank" rel="noopener">CC 4.0 BY</a>.
    </p>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const ADAPTER_COLORS = {
        'Passenger': { color: '#1e3a5f', fillColor: '#2563eb', label: 'Suomen matkustaja-asemat' },
        'European':  { color: '#7c2d12', fillColor: '#ea580c', label: 'Euroopan pääasemat' },
    };
    const DEFAULT_COLOR = { color: '#374151', fillColor: '#6b7280', label: 'Muu' };

    let map = null;
    const markersBySource = {};

    function initMap() {
        if (map) return;
        map = L.map('map').setView([55.0, 15.0], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
    }

    async function refreshStatus() {
        try {
            const res = await fetch('/api/stations/status');
            const data = await res.json();
            const text = document.getElementById('status-text');
            const clearBtn = document.getElementById('clear-btn');
            text.className = 'status-text';
            if (data.status === 'LOADING') {
                text.textContent = 'Ladataan tietoja...';
                text.className = 'status-text';
                setTimeout(refreshStatus, 1500);
            } else if (data.status === 'LOADED') {
                text.textContent = `✅ ${data.count} liikennepaikkkaa ladattu`;
                clearBtn.style.display = 'block';
            } else if (data.status === 'ERROR') {
                text.textContent = '❌ Lataus epäonnistui — tarkista PostgreSQL-yhteys';
                text.className = 'status-text error';
            } else {
                text.textContent = 'Ei ladattua dataa — valitse datalähde alta';
                clearBtn.style.display = 'none';
            }
        } catch {
            document.getElementById('status-text').textContent = '❌ Ei yhteyttä palvelimeen';
            document.getElementById('status-text').className = 'status-text error';
        }
    }

    async function loadAdapterPanel() {
        const res = await fetch('/api/stations/adapters');
        const data = await res.json();
        const list = document.getElementById('adapter-list');
        list.innerHTML = '';

        data.available.forEach(name => {
            const isActive = data.active.includes(name);
            const colors = ADAPTER_COLORS[name] || DEFAULT_COLOR;
            const item = document.createElement('div');
            item.className = 'adapter-item';
            item.id = `adapter-item-${name}`;
            item.innerHTML = `
                <label>
                    <input type="checkbox" id="cb-${name}" ${isActive ? 'checked' : ''}
                           onchange="toggleAdapter('${name}', this.checked)">
                    <span class="dot" style="background:${colors.fillColor}; border: 2px solid ${colors.color}"></span>
                    <span>${colors.label || name}</span>
                </label>`;
            list.appendChild(item);
        });

        for (const name of data.active) {
            await loadMarkersForAdapter(name);
        }
    }

    async function toggleAdapter(name, checked) {
        const item = document.getElementById(`adapter-item-${name}`);
        const cb = document.getElementById(`cb-${name}`);
        item.classList.add('loading');
        cb.disabled = true;

        if (checked) {
            await fetch(`/api/stations/adapters/${name}/load`, { method: 'POST' });
            pollUntilLoaded(name, item, cb);
        } else {
            await fetch(`/api/stations/adapters/${name}/unload`, { method: 'DELETE' });
            removeMarkersForSource(name);
            item.classList.remove('loading');
            cb.disabled = false;
            refreshStatus();
        }
    }

    function pollUntilLoaded(adapterName, item, cb) {
        const interval = setInterval(async () => {
            const res = await fetch('/api/stations/status');
            const data = await res.json();
            if (data.status === 'LOADED' || data.status === 'ERROR') {
                clearInterval(interval);
                item.classList.remove('loading');
                cb.disabled = false;
                if (data.status === 'LOADED') {
                    await loadMarkersForAdapter(adapterName);
                }
                refreshStatus();
            }
        }, 1000);
    }

    async function loadMarkersForAdapter(adapterName) {
        initMap();
        removeMarkersForSource(adapterName);
        const stations = await fetch('/api/stations').then(r => r.json());
        const colors = ADAPTER_COLORS[adapterName] || DEFAULT_COLOR;
        markersBySource[adapterName] = [];

        stations
            .filter(s => s.source === adapterName)
            .forEach(s => {
                const marker = L.circleMarker([s.latitude, s.longitude], {
                    radius: 5,
                    color: colors.color,
                    fillColor: colors.fillColor,
                    fillOpacity: 0.85,
                    weight: 1
                }).bindPopup(`<strong>${s.name}</strong><br><code>${s.shortCode}</code><br><em>${adapterName}</em>`);
                marker.addTo(map);
                markersBySource[adapterName].push(marker);
            });
    }

    function removeMarkersForSource(source) {
        if (!map || !markersBySource[source]) return;
        markersBySource[source].forEach(m => map.removeLayer(m));
        markersBySource[source] = [];
    }

    async function clearAll() {
        await fetch('/api/stations', { method: 'DELETE' });
        Object.keys(markersBySource).forEach(removeMarkersForSource);
        document.querySelectorAll('[id^="cb-"]').forEach(cb => {
            cb.checked = false;
            cb.disabled = false;
        });
        document.querySelectorAll('.adapter-item').forEach(i => i.classList.remove('loading'));
        document.getElementById('clear-btn').style.display = 'none';
        refreshStatus();
    }

    refreshStatus();
    loadAdapterPanel();
</script>
</body>
</html>
